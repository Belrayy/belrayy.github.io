<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Pic/letterbox.ico" type="image/x-icon">
    <link rel="stylesheet" href="../styles.css">
    <title>LetterboxB</title>
</head>

<body>


    <!-- header : pages and lang -->
    <header>
        <div class="navbar">
            <div class="logo">
                <span id="titre"><a href="../../index.html">LETTERBOXB</a></span>
            </div>
            <nav>
                <ul>
                    <li><a href="../../HTML/movies.html" id="movie-text">Movies & shows</a></li>
                    <li><a href="../../HTML/reviews.html" id="reviews-text">Reviews</a></li>
                </ul>
            </nav>

        </div>
    </header>


    


    <!-- Overlay for Sign-In or Log-In -->
    <div id="overlay" style="display: none;">
        <div class="overlay-content">
            <h2 id="overlayTitle">Choose an option</h2>

            <!-- Buttons to switch between Sign In and Log In forms -->
            <button id="signInBtn" onclick="showSignInForm()">Sign In</button>
            <button id="logInBtn" onclick="showLogInForm()">Log In</button>

            <!-- Sign-In Form (Initially hidden) -->
            <div id="signInForm" style="display: none;">
                <form>
                    <label for="signInEmail">Email:</label>
                    <input type="text" id="signInEmail" name="email" required><br><br>

                    <label for="signInUsername">Username :</label>
                    <input type="text" id="signInUsername" name="username" required><br><br>

                    <label for="signInPassword">Password:</label>
                    <input type="password" id="signInPassword" name="password" required><br><br>

                    <button type="submit" onclick="signin()">Sign Up</button>
                </form>
            </div>

            <!-- Log-In Form (Initially hidden) -->
            <div id="logInForm" style="display: none;">
                <form>
                    <label for="logInUsername">Username :</label>
                    <input type="text" id="logInUsername" name="username" required><br><br>

                    <label for="logInPassword">Password:</label>
                    <input type="password" id="logInPassword" name="password" required><br><br>

                    <button type="submit">Log In</button>
                </form>
            </div>

            <!-- Close Button -->
            <button id="closeOverlayBtn" onclick="closeOverlay()">Close</button>
        </div>
    </div>



    

    <footer class="footer">
        <div class="footer-links">
            <a href="#" id="About">About</a>
            <a href="#" id="Apps">Apps</a>
            <a href="#" id="Help">Help</a>
            <a href="https://www.omdbapi.com/" id="API">API</a>
            <a href="#" id="Contact">Contact</a>
        </div>
        <div class="footer-info">
            <p id="copyright">© LetterboxB Limited. Made by BELHAFIANE RAYYANE. Film data from OMDb.</p>
        </div>
        <nav id="langue">
            <ul>
                <li class="dropdown">
                    <div class="dropdown-content">
                        <a href="index.html" onclick="changeLanguage('en')">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a4/Flag_of_the_United_States.svg"
                                alt="English Flag" width="20" height="15"> English
                        </a>
                        <a href="index.html" onclick="changeLanguage('fr')">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg"
                                alt="French Flag" width="20" height="15"> Français
                        </a>
                    </div>
                </li>
            </ul>
        </nav>
    </footer>

    <script src="../script.js"></script>

</body>

</html>
