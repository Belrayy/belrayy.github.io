<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Pic/letterbox.ico" type="image/x-icon">
    <link rel="stylesheet" href="../styles.css">
    <title>LetterboxB</title>
</head>

<body>

    <!-- header : pages and lang -->
    <header>
        <div class="navbar">
            <div class="logo">
                <span id="titre"><a href="../../index.html">LETTERBOXB</a></span>
            </div>
            <nav>
                <ul>
                    <li><a href="../../HTML/movies.html" id="movie-text">Movies & shows</a></li>
                    <li><a href="../../HTML/reviews.html" id="reviews-text">Reviews</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Overlay for Sign-In or Log-In -->
    <div id="overlay">
        <div class="overlay-content">
            <h2 id="overlayTitle">LETTERBOXB</h2>

            <!-- Buttons to switch between Sign In and Log In forms -->
            <button id="signInBtn" class="overlay-button" onclick="showSignInForm()">Sign In</button>
            <button id="logInBtn" class="overlay-button" onclick="showLogInForm()">Log In</button>

            <!-- Sign-In Form (Initially hidden) -->
            <div id="signInForm" style="display: none;">
                <form>
                    <label for="signInEmail">Email:</label>
                    <input type="email" id="signInEmail" name="email" required><br><br>
            
                    <label id="signInUsername" for="signInUsername">Username :</label>
                    <input type="text" id="signInUsername" name="username" required><br><br>
            
                    <label id="signInPassword" for="signInPassword">Password:</label>
                    <input type="password" id="signInPassword" name="password" required><br><br>
                    <input type="checkbox" id="showUpPassword" onclick="togglePasswordVisibility('signInPassword')"> Show Password<br>
            
                    <button type="submit" id="signup" class="overlay-button" onclick="return signin()">Sign Up</button>
                </form>
            </div>

            <!-- Log-In Form (Initially hidden) -->
            <div id="logInForm" style="display: none;">
                <form onsubmit="return login()">
                    <label id="logInUsername" for="logInUsername">Username :</label>
                    <input type="text" id="logInUsername" name="username" required><br><br>
            
                    <label id="logInPassword" for="logInPassword">Password:</label>
                    <input type="password" id="logInPassword" name="password" required><br><br>
                    <input type="checkbox" id="showUpPassword" onclick="togglePasswordVisibility('logInPassword')"> Show Password<br>
            
                    <button type="submit" id="login" class="overlay-button">Log In</button>
                </form>
            </div>
            
            <!-- Close Button -->
            <button id="closeOverlayBtn" class="overlay-button" onclick="window.location.href='../../index.html'">Close</button>
        </div>
    </div>

    <script src="../script.js"></script>

</body>

</html>
