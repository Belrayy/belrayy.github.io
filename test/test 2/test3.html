<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overlay Example</title>
</head>
<body>

  <!-- Button to open the overlay -->
  <button id="openOverlayBtn">Open Overlay</button>

  <!-- Overlay content -->
  <div id="overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); color: white; text-align: center; padding-top: 50px;">
    <div>
      <h1>This is an overlay!</h1>
      <button id="closeOverlayBtn">Close Overlay</button>
    </div>
  </div>

  <script>
    // Get the button and overlay
    const openOverlayBtn = document.getElementById("openOverlayBtn");
    const closeOverlayBtn = document.getElementById("closeOverlayBtn");
    const overlay = document.getElementById("overlay");

    // Event listener to open the overlay
    openOverlayBtn.addEventListener("click", () => {
      overlay.style.display = "block";
    });

    // Event listener to close the overlay
    closeOverlayBtn.addEventListener("click", () => {
      overlay.style.display = "none";
    });
  </script>

</body>
</html>
