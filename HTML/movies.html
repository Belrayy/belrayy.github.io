<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Pic/letterbox.ico" type="image/x-icon">
    <link rel="stylesheet" href="../styles.css">
    <title>LetterboxB</title>
</head>

<body>
    <!-- <script src="script.js"></script> -->
    <header>
        <div class="navbar">
            <div class="logo">
                <span id="titre"><a href="../index.html">LETTERBOXB</a></span>
            </div>
            <nav>
                <ul>
                    <li><a href="../index.html" id="home-text">Home</a></li>
                    <li><a href="movies.html" id="movie-text">Movies & shows</a></li>
                    <li><a href="reviews.html" id="reviews-text">Reviews</a></li>
                </ul>
            </nav>
            <nav id="langue">
                <ul>
                    <li><a href="movies.html" onclick="changeLanguage('en')">English</a></li>
                    <li><a href="movies.html" onclick="changeLanguage('fr')">Français</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="sort-options">
        <label for="sortMovies" id="sortMoviesLabel">Sort Movies By:</label>
        <select id="sortMovies" onclick="loadMovies()">
            <option value="default" id="default">Default</option>
            <option value="dateAsc" id="dateAsc">Date Ascending</option>
            <option value="dateDesc" id="dateDesc">Date Descending</option>
            <option value="reviewsAsc" id="reviewsAsc">Reviews Ascending</option>
            <option value="reviewsDesc" id="reviewsDesc">Reviews Descending</option>
        </select>
    </div>

    <div id="movies-container"></div>


    <footer class="footer">
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Apps</a>
            <a href="#">Help</a>
            <a href="https://www.omdbapi.com/">API</a>
            <a href="#">Contact</a>
        </div>
        <div class="footer-info">
            <p>© LetterboxB Limited. Made by BELHAFIANE RAYYANE. Film data from OMDb.</p>
        </div>
    </footer>
    <script src="../script.js"></script>
</body>

</html>
