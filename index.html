<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Pic/letterbox.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <title>LetterboxB</title>
</head>

<body>


    <!-- header : pages and lang -->
    <header>
        <div class="navbar">
            <div class="logo">
                <span id="titre"><a href="index.html">LETTERBOXB</a></span>
            </div>
            <nav>
                <ul>
                    <li id="auth-link"><a id="login-link" href="./login/login.html">Sign-in/Log in</a></li>
                    <li><a href="HTML/movies.html" id="movie-text">Movies & shows</a></li>
                    <li><a href="HTML/reviews.html" id="reviews-text">Reviews</a></li>
                </ul>
            </nav>

        </div>
    </header>





    



    <!-- Movie Grid Section -->
    <section class="movie-grid">
        <h1 id="Latest">Latest Movies :</h1><br><br><br>
        <div id="movies-latest"></div>
    </section>


    <footer class="footer">
        <div class="footer-links">
            <a href="#" id="About">About</a>
            <a href="#" id="Apps">Apps</a>
            <a href="#" id="Help">Help</a>
            <a href="https://www.omdbapi.com/" id="API">API</a>
            <a href="#" id="Contact">Contact</a>
        </div>
        <div class="footer-info">
            <p id="copyright">© LetterboxB Limited. Made by BELHAFIANE RAYYANE. Film data from OMDb.</p>
        </div>
        <nav id="langue">
            <ul>
                <li class="dropdown">
                    <div class="dropdown-content">
                        <button id="change_Language" onclick="changeLanguage('en')">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a4/Flag_of_the_United_States.svg"
                                alt="English Flag" width="20" height="15"> English
                        </button>
                        <button id="change_Language" onclick="changeLanguage('fr')">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg"
                                alt="French Flag" width="20" height="15"> Français
                        </button>
                    </div>
                </li>
            </ul>
        </nav>
    </footer>

    <script src="script.js"></script>

</body>

</html>
