<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Pic/letterbox.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <title>Letterboxb</title>
</head>

<body>
    

    <!-- header : pages and lang -->
    <header>
        <div class="navbar">
            <div class="logo">
                <span>LETTERBOXB</span>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html" id="home-text">Home</a></li>
                    <li><a href="movies.html" id="movie-text">Movies  & shows</a></li>
                    <li><a href="reviews.html" id="reviews-text">Reviews</a></li>
                </ul>
            </nav>
            <nav>
                <ul>
                    <li><a href="index.html" onclick="changeLanguage('en')">English</a></li>
                    <li><a href="index.html" onclick="changeLanguage('fr')">Français</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div id="movies-container"></div>

    <script>
        async function loadMovies() {
            const container = document.getElementById("movies-container");

            try {
                const response = await fetch("scrap/movies.json");

                if (!response.ok) {
                    throw new Error(`Network response was not ok: ${response.statusText}`);
                }

                const movies = await response.json();

                movies.forEach(movie => {
                    const starRating = Math.round(movie.vote_average / 2);
                    const stars = "★".repeat(starRating) + "☆".repeat(5 - starRating);

                    const movieCard = document.createElement("div");
                    movieCard.className = "movie-card";
                    movieCard.innerHTML = `
                        <img src="${movie.poster_path}" alt="${movie.title}">
                        <h3>${movie.title}</h3>
                        <p class="release-date">${movie.release_date}</p>
                        <p class="overview">${movie.overview}</p>
                        <p class="rating">${stars}</p>
                    `;

                    container.appendChild(movieCard);
                });
            } catch (error) {
                console.error("Error loading movies:", error);
                container.innerHTML = "<p>Error loading movies. Please try again later.</p>";
            }
        }

        loadMovies();
    </script>

    <!-- <div id="movies-container"></div> -->

    <!-- <script src="script.js"></script> -->
</body>

</html>
